<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circuit Node</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <!-- Boot splash — shown while the node sidecar comes up -->
  <section id="boot" class="view boot">
    <div class="mark" aria-hidden="true">◉</div>
    <div class="boot-title">CIRCUIT NODE</div>
    <div class="boot-sub" id="boot-status">starting your node…</div>
    <div class="boot-bar"><span></span></div>
  </section>

  <!-- Contribute screen — reached from the top bar's Contribute button -->
  <section id="picker" class="view" hidden>
    <div class="picker-inner">
      <header class="picker-head">
        <div class="mark sm" aria-hidden="true">◉</div>
        <h1>Power the Circuit network</h1>
        <p>Two ways to contribute from this machine — lend spare CPU to host agents, or an NVIDIA GPU to serve inference.</p>
      </header>
      <div class="modes">
        <button class="mode-card cpu" data-mode="cpu">
          <div class="mode-top">
            <span class="mode-tag">Any computer · low barrier</span>
            <span class="mode-ico" aria-hidden="true">
              <svg viewBox="0 0 34 34" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
                <circle cx="17" cy="17" r="3.6" />
                <circle cx="6" cy="7" r="2.4" /><circle cx="28" cy="7" r="2.4" />
                <circle cx="6" cy="27" r="2.4" /><circle cx="28" cy="27" r="2.4" />
                <path d="M13.7 14.3 8.4 9M20.3 14.3 25.6 9M13.7 19.7 8.4 25M20.3 19.7 25.6 25" />
              </svg>
            </span>
          </div>
          <h2>CPU · Agent cloud</h2>
          <p>Lend spare CPU to <b>run agents for the Circuit cloud</b> under a budget you set. No GPU, no Docker, no setup. Keys stay off your box.</p>
          <div class="mode-go">Set a budget &amp; go →</div>
        </button>
        <button class="mode-card gpu" data-mode="gpu">
          <div class="mode-top">
            <span class="mode-tag">NVIDIA GPU · high value</span>
            <span class="mode-ico" aria-hidden="true">
              <svg viewBox="0 0 34 34" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round">
                <rect x="6" y="6.5" width="22" height="5.4" rx="1.6" />
                <rect x="6" y="14.3" width="22" height="5.4" rx="1.6" fill="currentColor" />
                <rect x="6" y="22.1" width="22" height="5.4" rx="1.6" />
              </svg>
            </span>
          </div>
          <h2>GPU · Inference mesh</h2>
          <p>Your GPU holds a <b>slice of the decentralized model</b> and serves inference. Heavier setup, bigger share. Needs an NVIDIA GPU.</p>
          <div class="mode-go">Check my GPU →</div>
        </button>
      </div>
      <footer class="picker-foot">
        <button class="link" id="skip-to-dash">← Back to dashboard</button>
        <span id="picker-node" class="muted mono"></span>
      </footer>
    </div>
  </section>

  <!-- Main view: native top bar + the node's full dashboard, embedded -->
  <section id="main" class="view" hidden>
    <header class="topbar">
      <div class="brand"><span class="mark sm" aria-hidden="true">◉</span> Circuit Node</div>
      <div class="topbar-right">
        <span id="net-pill" class="pill">node</span>
        <button id="agent-btn" class="btn ghost sm" title="Pair a local circuit-agent (enables the Agent + Chat tabs)">Connect agent</button>
        <button id="contribute-btn" class="btn sm">Contribute</button>
        <button id="update-btn" class="btn sm" hidden>Update</button>
        <button id="ext-btn" class="icon-btn" title="Open the dashboard in your browser (for Phantom wallet actions)">↗</button>
      </div>
    </header>
    <iframe id="dashframe" title="Node dashboard" referrerpolicy="no-referrer"></iframe>
  </section>

  <!-- Modal host for connect wizards -->
  <div id="modal" class="modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true">
      <button class="modal-x" id="modal-x" aria-label="Close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="app.js"></script>
</body>
</html>
